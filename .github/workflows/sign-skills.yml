name: Sign instruction files

on:
  push:
    branches: [main]
    paths:
      - 'SKILL.md'
      - 'scripts/call_weather.py'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sign instruction files
        uses: always-further/nono-sigstore-action@main
        with:
          files: "SKILL.md scripts/call_weather.py"
